name: Distribution Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - main
      - preview
      - dev

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - win32-x64
          - win32-arm64
          - linux-x64
          - linux-arm64
          - linux-armhf
          - darwin-x64
          - darwin-arm64
          - alpine-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install 7-Zip
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Restore portable dependency downloads
        uses: actions/cache@v4
        with:
          path: dist/.downloads
          key: ema-dist-downloads-${{ matrix.platform }}-${{ hashFiles('packages/ema-dist/src/download.ts') }}
          restore-keys: |
            ema-dist-downloads-${{ matrix.platform }}-

      - name: Install dependencies
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            win32-x64)
              target_os=win32
              target_cpu=x64
              target_libc=current
              ;;
            win32-arm64)
              target_os=win32
              target_cpu=arm64
              target_libc=current
              ;;
            linux-x64)
              target_os=linux
              target_cpu=x64
              target_libc=glibc
              ;;
            linux-arm64)
              target_os=linux
              target_cpu=arm64
              target_libc=glibc
              ;;
            linux-armhf)
              target_os=linux
              target_cpu=arm
              target_libc=glibc
              ;;
            darwin-x64)
              target_os=darwin
              target_cpu=x64
              target_libc=current
              ;;
            darwin-arm64)
              target_os=darwin
              target_cpu=arm64
              target_libc=current
              ;;
            alpine-x64)
              target_os=linux
              target_cpu=x64
              target_libc=musl
              ;;
            *)
              echo "Unsupported distribution platform: ${{ matrix.platform }}" >&2
              exit 1
              ;;
          esac

          pnpm install --frozen-lockfile \
            --os=current \
            --os="$target_os" \
            --cpu=current \
            --cpu="$target_cpu" \
            --libc=current \
            --libc="$target_libc"

      - name: Build WebUI standalone app
        run: pnpm --filter ema-webui build

      - name: Stage portable package
        run: pnpm --filter ema-dist run stage -- --platform ${{ matrix.platform }} --kind portable

      - name: Download portable dependencies
        run: pnpm --filter ema-dist run download -- --platform ${{ matrix.platform }}

      - name: Build portable zip package
        if: ${{ matrix.platform != 'linux-armhf' && matrix.platform != 'alpine-x64' }}
        run: pnpm --filter ema-dist run pack -- --platform ${{ matrix.platform }} --kind portable --format zip

      - name: Upload portable zip artifact
        if: ${{ matrix.platform != 'linux-armhf' && matrix.platform != 'alpine-x64' }}
        uses: actions/upload-artifact@v4
        with:
          name: ema-${{ matrix.platform }}-portable-zip
          if-no-files-found: error
          path: dist/${{ matrix.platform }}/ema-${{ matrix.platform }}-portable-*.zip

      - name: Build portable 7z package
        if: ${{ matrix.platform != 'linux-armhf' && matrix.platform != 'alpine-x64' }}
        run: pnpm --filter ema-dist run pack -- --platform ${{ matrix.platform }} --kind portable --format 7z

      - name: Upload portable 7z artifact
        if: ${{ matrix.platform != 'linux-armhf' && matrix.platform != 'alpine-x64' }}
        uses: actions/upload-artifact@v4
        with:
          name: ema-${{ matrix.platform }}-portable-7z
          if-no-files-found: error
          path: dist/${{ matrix.platform }}/ema-${{ matrix.platform }}-portable-*.7z

      - name: Build portable installer
        if: ${{ matrix.platform != 'linux-armhf' && matrix.platform != 'alpine-x64' }}
        run: pnpm --filter ema-dist run installers -- --platform ${{ matrix.platform }} --kind portable

      - name: Upload portable installer artifact
        if: ${{ matrix.platform != 'linux-armhf' && matrix.platform != 'alpine-x64' }}
        uses: actions/upload-artifact@v4
        with:
          name: ema-${{ matrix.platform }}-portable-installer
          if-no-files-found: error
          path: dist/${{ matrix.platform }}/ema-${{ matrix.platform }}-portable-*-installer.*

      - name: Write portable skipped note
        if: ${{ matrix.platform == 'linux-armhf' || matrix.platform == 'alpine-x64' }}
        run: pnpm --filter ema-dist run skip-note -- --platform ${{ matrix.platform }}

      - name: Upload portable skipped note
        if: ${{ matrix.platform == 'linux-armhf' || matrix.platform == 'alpine-x64' }}
        uses: actions/upload-artifact@v4
        with:
          name: ema-${{ matrix.platform }}-portable-skipped
          if-no-files-found: error
          path: dist/${{ matrix.platform }}/*.SKIPPED.txt

      - name: Stage minimal package
        run: pnpm --filter ema-dist run stage -- --platform ${{ matrix.platform }} --kind minimal

      - name: Build minimal zip package
        run: pnpm --filter ema-dist run pack -- --platform ${{ matrix.platform }} --kind minimal --format zip

      - name: Upload minimal zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ema-${{ matrix.platform }}-minimal-zip
          if-no-files-found: error
          path: dist/${{ matrix.platform }}/ema-${{ matrix.platform }}-minimal-*.zip

      - name: Build minimal 7z package
        run: pnpm --filter ema-dist run pack -- --platform ${{ matrix.platform }} --kind minimal --format 7z

      - name: Upload minimal 7z artifact
        uses: actions/upload-artifact@v4
        with:
          name: ema-${{ matrix.platform }}-minimal-7z
          if-no-files-found: error
          path: dist/${{ matrix.platform }}/ema-${{ matrix.platform }}-minimal-*.7z

      - name: Build minimal installer
        run: pnpm --filter ema-dist run installers -- --platform ${{ matrix.platform }} --kind minimal

      - name: Upload minimal installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ema-${{ matrix.platform }}-minimal-installer
          if-no-files-found: error
          path: dist/${{ matrix.platform }}/ema-${{ matrix.platform }}-minimal-*-installer.*
